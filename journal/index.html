<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Thought Journal</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f7f3ee;
      --card: #fffaf4;
      --text: #26211d;
      --muted: #8b7d70;
      --accent: #9b6b43;
      --border: #e5d8ca;
      --danger: #9c3b3b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, #fff7e8, transparent 35%),
        linear-gradient(135deg, #f7f3ee, #efe6dc);
      color: var(--text);
      padding: 32px 16px;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
    }

    .card,
    .entry {
      background: rgba(255, 250, 244, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(77, 55, 35, 0.08);
      backdrop-filter: blur(10px);
    }

    .card {
      padding: 22px;
      margin-bottom: 28px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      outline: none;
      background: #fffaf4;
      color: var(--text);
      font: inherit;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.7;
      border: none;
      background: transparent;
      padding: 0;
    }

    textarea::placeholder,
    input::placeholder {
      color: #b3a597;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font: inherit;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    button.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    button.danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid #e3baba;
    }

    .status {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .hidden {
      display: none;
    }

    .entries-title {
      margin: 10px 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .entry {
      margin-bottom: 14px;
      overflow: hidden;
    }

    .entry-header {
      width: 100%;
      background: transparent;
      color: var(--text);
      border: none;
      border-radius: 0;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      text-align: left;
    }

    .entry-header:hover {
      transform: none;
      opacity: 1;
      background: rgba(155, 107, 67, 0.06);
    }

    .entry-date {
      font-size: 1rem;
    }

    .entry-arrow {
      color: var(--muted);
    }

    .entry-body {
      display: none;
      padding: 0 20px 20px;
      color: #3b332d;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .entry.open .entry-body {
      display: block;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 28px;
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <h1>Thought Journal</h1>
      <div class="subtitle">A private place to write things down.</div>
    </header>

    <section id="authCard" class="card">
      <input id="emailInput" type="email" placeholder="Email" />
      <input id="passwordInput" type="password" placeholder="Password" />

      <div class="actions">
        <div>
          <button id="loginBtn">Log in</button>
          <button id="signupBtn" class="secondary">Sign up</button>
        </div>
        <span id="authStatus" class="status"></span>
      </div>
    </section>

    <section id="journalApp" class="hidden">
      <section class="card">
        <textarea id="entryText" placeholder="What are you thinking about?"></textarea>

        <div class="actions">
          <span id="saveStatus" class="status">Private journal ready.</span>
          <div>
            <button id="refreshBtn" class="secondary">Refresh</button>
            <button id="logoutBtn" class="danger">Log out</button>
            <button id="saveBtn">Save Entry</button>
          </div>
        </div>
      </section>

      <div class="entries-title">Older Notes</div>
      <section id="entries"></section>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://yyypjqedpbaxvawoaplr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5eXBqcWVkcGJheHZhd29hcGxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzcxMTMsImV4cCI6MjA5MjcxMzExM30.x1eMB7-wyo-Wz1lAaYZZc-8Dx96p7Fu0e38Lmve02Tc";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authCard = document.getElementById("authCard");
    const journalApp = document.getElementById("journalApp");

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const entryText = document.getElementById("entryText");
    const entriesEl = document.getElementById("entries");
    const saveBtn = document.getElementById("saveBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const authStatus = document.getElementById("authStatus");
    const saveStatus = document.getElementById("saveStatus");

    let currentUser = null;

    function formatDate(dateString) {
      return new Date(dateString).toLocaleString(undefined, {
        weekday: "short",
        month: "long",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        currentUser = null;
        authCard.classList.remove("hidden");
        journalApp.classList.add("hidden");
        return;
      }

      currentUser = data.user;
      authCard.classList.add("hidden");
      journalApp.classList.remove("hidden");
      loadEntries();
    }

    async function signUp() {
      authStatus.textContent = "Creating account...";

      const { error } = await supabaseClient.auth.signUp({
        email: emailInput.value.trim(),
        password: passwordInput.value
      });

      if (error) {
        authStatus.textContent = error.message;
        return;
      }

      authStatus.textContent = "Account created. Check your email if confirmation is enabled.";
      await checkSession();
    }

    async function logIn() {
      authStatus.textContent = "Logging in...";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email: emailInput.value.trim(),
        password: passwordInput.value
      });

      if (error) {
        authStatus.textContent = error.message;
        return;
      }

      authStatus.textContent = "";
      await checkSession();
    }

    async function logOut() {
      await supabaseClient.auth.signOut();
      currentUser = null;
      entryText.value = "";
      entriesEl.innerHTML = "";
      authCard.classList.remove("hidden");
      journalApp.classList.add("hidden");
    }

    async function saveEntry() {
      const body = entryText.value.trim();

      if (!body) {
        saveStatus.textContent = "Write something first.";
        return;
      }

      if (!currentUser) {
        saveStatus.textContent = "You need to be logged in.";
        return;
      }

      saveBtn.disabled = true;
      saveStatus.textContent = "Saving...";

      const { error } = await supabaseClient
        .from("journal_entries")
        .insert({
          body,
          user_id: currentUser.id
        });

      saveBtn.disabled = false;

      if (error) {
        saveStatus.textContent = error.message;
        return;
      }

      entryText.value = "";
      saveStatus.textContent = "Saved.";
      await loadEntries();
    }

    async function loadEntries() {
      entriesEl.innerHTML = `<div class="empty">Loading notes...</div>`;

      const { data, error } = await supabaseClient
        .from("journal_entries")
        .select("id, body, created_at")
        .order("created_at", { ascending: false });

      if (error) {
        entriesEl.innerHTML = `<div class="empty">${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        entriesEl.innerHTML = `<div class="empty">No entries yet.</div>`;
        return;
      }

      entriesEl.innerHTML = "";

      data.forEach(entry => {
        const article = document.createElement("article");
        article.className = "entry";

        const header = document.createElement("button");
        header.className = "entry-header";

        const date = document.createElement("span");
        date.className = "entry-date";
        date.textContent = formatDate(entry.created_at);

        const arrow = document.createElement("span");
        arrow.className = "entry-arrow";
        arrow.textContent = "Open";

        const body = document.createElement("div");
        body.className = "entry-body";
        body.textContent = entry.body;

        header.appendChild(date);
        header.appendChild(arrow);

        header.addEventListener("click", () => {
          article.classList.toggle("open");
          arrow.textContent = article.classList.contains("open") ? "Close" : "Open";
        });

        article.appendChild(header);
        article.appendChild(body);
        entriesEl.appendChild(article);
      });
    }

    loginBtn.addEventListener("click", logIn);
    signupBtn.addEventListener("click", signUp);
    logoutBtn.addEventListener("click", logOut);
    saveBtn.addEventListener("click", saveEntry);
    refreshBtn.addEventListener("click", loadEntries);

    checkSession();
  </script>
</body>
</html>
