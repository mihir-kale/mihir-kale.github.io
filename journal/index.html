<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f4ef;
      color: #222;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    header {
      margin-bottom: 32px;
    }

    h1 {
      font-size: 44px;
      letter-spacing: -1.5px;
      margin: 0 0 10px;
      font-weight: 700;
    }

    .subtitle {
      color: #777;
      font-size: 16px;
      margin: 0;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 28px 0;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 240px;
      padding: 14px 16px;
      border-radius: 999px;
      border: 1px solid #ddd6cc;
      background: #fffaf3;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #b9aa95;
    }

    .grid {
      column-count: 3;
      column-gap: 18px;
    }

    .card {
      break-inside: avoid;
      background: #fffaf3;
      border: 1px solid #e6ded2;
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(40, 30, 20, 0.06);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(40, 30, 20, 0.1);
    }

    .body {
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 15.5px;
      margin-bottom: 16px;
    }

    .meta {
      font-size: 12px;
      color: #938878;
      margin-bottom: 12px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #eee4d6;
      color: #6b5e4e;
    }

    .empty {
      margin-top: 60px;
      color: #8a8174;
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .grid {
        column-count: 2;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 32px 18px;
      }

      h1 {
        font-size: 36px;
      }

      .grid {
        column-count: 1;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <h1>Journal</h1>
      <p class="subtitle">A quiet place for thoughts, notes, links, and fragments.</p>

      <div class="controls">
        <input id="searchInput" type="text" placeholder="Search thoughts..." />
      </div>
    </header>

    <section id="journalGrid" class="grid"></section>
    <p id="emptyState" class="empty" style="display: none;">No thoughts found.</p>
  </main>

  <script>
    const SUPABASE_URL = "https://yyypjqedpbaxvawoaplr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5eXBqcWVkcGJheHZhd29hcGxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzcxMTMsImV4cCI6MjA5MjcxMzExM30.x1eMB7-wyo-Wz1lAaYZZc-8Dx96p7Fu0e38Lmve02Tc";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const grid = document.getElementById("journalGrid");
    const searchInput = document.getElementById("searchInput");
    const emptyState = document.getElementById("emptyState");

    let journalItems = [];

    async function loadJournal() {
      const { data, error } = await supabase
        .from("journal")
        .select("id, body, created_at, tags")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Error loading journal:", error);
        emptyState.textContent = "Could not load journal.";
        emptyState.style.display = "block";
        return;
      }

      journalItems = data || [];
      renderJournal(journalItems);
    }

    function renderJournal(items) {
      grid.innerHTML = "";

      if (!items.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      items.forEach(item => {
        const card = document.createElement("article");
        card.className = "card";

        const date = item.created_at
          ? new Date(item.created_at).toLocaleString([], {
              month: "short",
              day: "numeric",
              year: "numeric",
              hour: "numeric",
              minute: "2-digit"
            })
          : "";

        const tags = Array.isArray(item.tags) ? item.tags : [];

        card.innerHTML = `
          <div class="meta">${date}</div>
          <div class="body">${escapeHtml(item.body || "")}</div>
          ${
            tags.length
              ? `<div class="tags">
                  ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
                </div>`
              : ""
          }
        `;

        grid.appendChild(card);
      });
    }

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase().trim();

      const filtered = journalItems.filter(item => {
        const bodyMatch = (item.body || "").toLowerCase().includes(query);
        const tagMatch = Array.isArray(item.tags)
          ? item.tags.some(tag => tag.toLowerCase().includes(query))
          : false;

        return bodyMatch || tagMatch;
      });

      renderJournal(filtered);
    });

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadJournal();
  </script>
</body>
</html>
