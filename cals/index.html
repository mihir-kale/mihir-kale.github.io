<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MihirOS</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #f4f8fb;
      color: #172033;
    }

    .topbar {
      height: 54px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #4b5563;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 54px);
    }

    .panel {
      padding: 28px;
    }

    .left {
      background: #f7f8fd;
      border-right: 1px solid rgba(0,0,0,0.04);
    }

    .right {
      background: #eef8ff;
    }

    .add-button {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 34px;
      font-weight: 900;
      box-shadow: 0 18px 36px rgba(34,197,94,0.28);
      cursor: pointer;
    }

    .section-title {
      margin: 26px 0 12px;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #7b8794;
      font-weight: 900;
    }

    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 24px;
      padding: 22px 28px;
      margin-bottom: 14px;
      box-shadow: 0 18px 48px rgba(15,23,42,0.06);
    }

    .task-card {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: start;
      gap: 14px;
      transition: all 0.25s ease;
    }

    .task-card:has(.task-checkbox:checked) {
      opacity: 0.45;
      transform: scale(0.98);
    }

    .task-checkbox {
      width: 20px;
      height: 20px;
      margin-top: 3px;
      accent-color: #22c55e;
      cursor: pointer;
    }

    .card-title {
      font-size: 18px;
      font-weight: 900;
    }

    .card-notes {
      margin-top: 4px;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.4;
    }

    .card-meta {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 800;
      color: #9ca3af;
    }

    .event-row {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 18px;
      align-items: center;
    }

    .date-pill {
      background: #eef0f3;
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      font-weight: 900;
      color: #374151;
    }

    .date-pill small {
      display: block;
      color: #7b8794;
      font-size: 12px;
      margin-top: 2px;
    }

    .empty {
      color: #9ca3af;
      font-weight: 700;
      padding: 18px;
    }

    @media (max-width: 800px) {
      .columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="topbar" id="clock"></div>

<main class="columns">
  <section class="panel left">
    <button class="add-button" onclick="addTask()">+</button>

    <div class="section-title">TASKS</div>
    <div id="tasks"></div>
  </section>

  <section class="panel right">
    <button class="add-button" onclick="addEvent()">+</button>

    <div class="section-title">TODAY</div>
    <div id="today-events"></div>

    <div class="section-title">THIS WEEK</div>
    <div id="week-events"></div>
  </section>
</main>

<script>
  const SUPABASE_URL = "https://yyypjqedpbaxvawoaplr.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR_KEY_HERE";

  const db = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  function updateClock() {
    const now = new Date();

    document.getElementById("clock").textContent =
      now.toLocaleDateString([], {
        weekday: "long",
        month: "long",
        day: "numeric"
      }) +
      " at " +
      now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
  }

  setInterval(updateClock, 1000);
  updateClock();

  async function loadTasks() {
    const { data, error } = await db
      .from("tasks")
      .select("*")
      .eq("completed", false);

    if (error) {
      console.error(error);
      document.getElementById("tasks").innerHTML =
        `<div class="empty">Error loading tasks</div>`;
      return;
    }

    const container = document.getElementById("tasks");
    container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML = `<div class="empty">No tasks</div>`;
      return;
    }

    const sortedTasks = data.sort((a, b) => {
      const aDue = normalizeDueDate(a.due_at);
      const bDue = normalizeDueDate(b.due_at);

      if (aDue !== bDue) return aDue - bDue;

      return (b.priority ?? 5) - (a.priority ?? 5);
    });

    sortedTasks.forEach(task => {
      container.innerHTML += `
        <div class="card task-card">
          <input
            type="checkbox"
            class="task-checkbox"
            onchange="completeTask('${task.id}')"
          />

          <div>
            <div class="card-title">${escapeHtml(task.title)}</div>

            ${task.notes ? `<div class="card-notes">${escapeHtml(task.notes)}</div>` : ""}

            <div class="card-meta">
              due ${formatDue(task.due_at)} · p${task.priority ?? 5}
            </div>
          </div>
        </div>
      `;
    });
  }

  function normalizeDueDate(dueAt) {
    const date = dueAt ? new Date(dueAt) : new Date();
    date.setHours(0, 0, 0, 0);
    return date.getTime();
  }

  function formatDue(dueAt) {
    if (!dueAt) return "today";

    const date = new Date(dueAt);
    const today = new Date();

    date.setHours(0, 0, 0, 0);
    today.setHours(0, 0, 0, 0);

    const diff = Math.round((date - today) / 86400000);

    if (diff === 0) return "today";
    if (diff === 1) return "tomorrow";
    if (diff === -1) return "yesterday";

    return date.toLocaleDateString([], {
      month: "short",
      day: "numeric"
    });
  }

  async function completeTask(id) {
    const { error } = await db
      .from("tasks")
      .update({
        completed: true,
        completed_at: new Date().toISOString()
      })
      .eq("id", id);

    if (error) {
      console.error(error);
      alert("Could not complete task");
      return;
    }

    setTimeout(() => {
      loadTasks();
    }, 300);
  }

  async function loadEvents() {
    const GCAL_API_URL = "https://YOUR-VERCEL-APP.vercel.app/api/events";

    try {
      const res = await fetch(GCAL_API_URL);
      const events = await res.json();

      if (!res.ok) {
        console.error(events);
        document.getElementById("today-events").innerHTML =
          `<div class="empty">Error loading events</div>`;
        document.getElementById("week-events").innerHTML = "";
        return;
      }

      renderEvents(events || []);
    } catch (err) {
      console.error(err);
      document.getElementById("today-events").innerHTML =
        `<div class="empty">Calendar API not connected yet</div>`;
      document.getElementById("week-events").innerHTML = "";
    }
  }

  function renderEvents(events) {
    const todayEl = document.getElementById("today-events");
    const weekEl = document.getElementById("week-events");

    todayEl.innerHTML = "";
    weekEl.innerHTML = "";

    const today = new Date().toDateString();

    const upcomingEvents = events
      .filter(event => event.start)
      .filter(event => {
        const start = new Date(event.start);
        return isWithinComingWeek(start);
      })
      .sort((a, b) => new Date(a.start) - new Date(b.start));

    upcomingEvents.forEach(event => {
      const start = new Date(event.start);

      const card = `
        <div class="card event-row">
          <div class="date-pill">
            <div>${start.toLocaleDateString([], { weekday: "short" })}</div>
            <small>${start.toLocaleDateString([], { month: "short", day: "numeric" })}</small>
          </div>

          <div>
            <div class="card-title">
              ${formatEventTime(start)} - ${escapeHtml(event.title)}
            </div>

            ${event.location ? `<div class="card-notes">${escapeHtml(event.location)}</div>` : ""}
          </div>
        </div>
      `;

      if (start.toDateString() === today) {
        todayEl.innerHTML += card;
      } else {
        weekEl.innerHTML += card;
      }
    });

    if (!todayEl.innerHTML) {
      todayEl.innerHTML = `<div class="empty">No events today</div>`;
    }

    if (!weekEl.innerHTML) {
      weekEl.innerHTML = `<div class="empty">No events this week</div>`;
    }
  }

  function isWithinComingWeek(date) {
    const now = new Date();

    const weekFromNow = new Date();
    weekFromNow.setDate(now.getDate() + 7);

    return date >= now && date <= weekFromNow;
  }

  function formatEventTime(date) {
    return date.toLocaleTimeString([], {
      hour: "numeric",
      minute: "2-digit"
    });
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function addTask() {
    alert("Add task coming next");
  }

  function addEvent() {
    alert("Add event coming next");
  }

  loadTasks();
  loadEvents();
</script>

</body>
</html>
