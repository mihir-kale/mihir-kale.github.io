<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, sans-serif;
      background: #000;
      color: #fff;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }
    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
    .header h1 { font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
    .header a { color: #666; font-size: 12px; text-decoration: none; transition: color .2s; }
    .header a:hover { color: #fff; }
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
    .left-col { display: flex; flex-direction: column; gap: 12px; }
    .stat-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 600; color: #fff; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .week-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; }
    .week-box-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .week-bar { display: flex; gap: 4px; margin-bottom: 6px; }
    .week-day { flex: 1; height: 6px; border-radius: 3px; background: #222; }
    .week-day.done { background: #0a84ff; }
    .week-day.today { background: #444; }
    .week-day.future { background: #222; }
    .week-labels { display: flex; gap: 4px; }
    .week-labels span { flex: 1; text-align: center; font-size: 9px; color: #555; }
    .week-labels span.today { color: #0a84ff; }
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      padding-right: 4px;
    }
    .right-col::-webkit-scrollbar { width: 4px; }
    .right-col::-webkit-scrollbar-track { background: transparent; }
    .right-col::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .day-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 14px 16px; flex-shrink: 0; }
    .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .day-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #666; }
    .day-label.today { color: #0a84ff; }
    .day-badge-row { display: flex; align-items: center; gap: 8px; }
    .workout-badge {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .workout-badge.cardio { background: #0a84ff20; color: #0a84ff; }
    .workout-badge.strength { background: #ff6b3520; color: #ff6b35; }
    .workout-badge.rest { background: #33333320; color: #666; }
    .workout-title { font-size: 14px; font-weight: 500; color: #fff; }
    .exercise-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
    .exercise-name { color: #ccc; }
    .exercise-detail { color: #888; font-variant-numeric: tabular-nums; }
    .rest-label { font-size: 13px; color: #555; font-style: italic; }
    .empty-day { font-size: 13px; color: #333; }
    .completed-dot { width: 8px; height: 8px; border-radius: 50%; background: #0a84ff; flex-shrink: 0; }
    .section-header { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: #888; padding-bottom: 8px; border-bottom: 1px solid #1a1a1a; margin-bottom: 2px; }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .left-col { flex-direction: row; flex-wrap: wrap; }
      .stat-box { flex: 1; min-width: calc(50% - 6px); }
      .week-box { min-width: 100%; }
      .right-col { max-height: none; overflow-y: visible; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Training</h1>
    <a href="/dashboard/">← Dashboard</a>
  </div>

  <div class="layout">
    <div class="left-col" id="leftCol"></div>
    <div class="right-col" id="workoutList"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://heyrtjzntnicqsfemcmi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhleXJ0anpudG5pY3FzZmVtY21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTU3NDksImV4cCI6MjA5OTM3MTc0OX0.MwivwC-MUgI7J4-bH5ahjuL8YLQYPsR1vzcRVlpoTNo";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DAY_NAMES = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    function todayEt() {
      return new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
    }

    function esc(str) {
      if (!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${dd}`;
    }

    function formatLabel(d) {
      return `${DAY_NAMES[d.getDay()]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
    }

    function renderStats(cardio, workouts) {
      const now = new Date();
      const weekAgo = new Date(now);
      weekAgo.setDate(now.getDate() - 7);

      const weekCardio = cardio.filter(a => new Date(a.activity_date) >= weekAgo);
      const weekWorkouts = workouts.filter(w => new Date(w.workout_date) >= weekAgo);

      const km = weekCardio.reduce((s, a) => s + (a.distance_km || 0), 0).toFixed(1);
      const sets = weekWorkouts.reduce((s, w) =>
        s + (w.exercises || []).reduce((ss, ex) => ss + (ex.sets || 0), 0), 0);
      const volume = weekWorkouts.reduce((s, w) =>
        s + (w.exercises || []).reduce((ss, ex) => ss + (ex.sets || 0) * (ex.reps || 0) * (ex.weight_kg || 0), 0), 0);
      const sessions = weekWorkouts.length + weekCardio.length;

      document.getElementById("leftCol").innerHTML = `
        <div class="stat-box"><div class="stat-value">${km}</div><div class="stat-label">KM this week</div></div>
        <div class="stat-box"><div class="stat-value">${(volume / 1000).toFixed(1)}</div><div class="stat-label">Volume</div></div>
        <div class="stat-box"><div class="stat-value">${sets}</div><div class="stat-label">Sets</div></div>
        <div class="stat-box"><div class="stat-value">${sessions}</div><div class="stat-label">Sessions</div></div>
      `;
    }

    function renderWeekBar(planned, completedDates) {
      if (!planned.length) return "";
      const start = new Date(planned[0].workout_date + "T12:00:00");
      const end = new Date(planned[planned.length - 1].workout_date + "T12:00:00");
      const today = todayEt();

      const bars = [];
      const labels = [];
      const d = new Date(start);
      while (d <= end) {
        const ds = formatDate(d);
        const done = completedDates.has(ds);
        const isToday = ds === today;
        bars.push(`<div class="week-day ${done ? "done" : isToday ? "today" : "future"}"></div>`);
        labels.push(`<span class="${isToday ? "today" : ""}">${DAY_NAMES[d.getDay()]}</span>`);
        d.setDate(d.getDate() + 1);
      }

      return `
        <div class="week-box">
          <div class="week-box-title">Schedule</div>
          <div class="week-bar">${bars.join("")}</div>
          <div class="week-labels">${labels.join("")}</div>
        </div>`;
    }

    function renderDay(day, workout, completed, isToday) {
      const labelClass = isToday ? "today" : "";
      const todayDot = isToday ? '<div class="completed-dot"></div>' : "";
      const completedDot = completed && !isToday ? '<div class="completed-dot"></div>' : "";
      const dots = todayDot + completedDot;

      let content = "";
      if (!workout) {
        content = '<div class="empty-day">No workout planned</div>';
      } else if (workout.workout_type === "rest") {
        content = '<div class="rest-label">Active recovery</div>';
      } else if (workout.workout_type === "run") {
        content = `<div class="exercise-row">
          <span class="exercise-name">Run</span>
          <span class="exercise-detail">${esc(workout.title.replace(/^Run\s*/i, ""))}</span>
        </div>`;
      } else {
        content = (workout.exercises || []).map(ex => {
          const setsReps = ex.sets && ex.reps ? `${ex.sets}×${ex.reps}` : ex.sets ? `${ex.sets} sets` : "";
          const weight = ex.target_weight_kg ? ` · ${ex.target_weight_kg}kg` : "";
          return `<div class="exercise-row">
            <span class="exercise-name">${esc(ex.name)}</span>
            <span class="exercise-detail">${esc(setsReps + weight)}</span>
          </div>`;
        }).join("");
      }

      return `
        <div class="day-card">
          <div class="day-header">
            <div class="day-badge-row">
              ${workout ? `<span class="workout-badge ${esc(workout.workout_type === "run" ? "cardio" : workout.workout_type)}">${esc(workout.workout_type === "run" ? "cardio" : workout.workout_type)}</span>` : ""}
            </div>
            <div class="day-label ${labelClass}">${day.label}${dots}</div>
          </div>
          ${content}
        </div>`;
    }

    async function init() {
      const today = todayEt();

      const [planRes, cardioRes, wktRes] = await Promise.all([
        db.from("planned_workouts")
          .select("id, title, workout_date, workout_type, planned_exercises(name, sets, reps, target_weight_kg, order_index)")
          .gte("workout_date", today)
          .order("workout_date")
          .limit(8),
        db.from("strava_activities").select("activity_date, distance_km"),
        db.from("strava_workouts").select("workout_date, strava_exercises(sets, reps, weight_kg)")
      ]);

      const plans = (planRes.data || []).map(w => ({
        ...w,
        exercises: (w.planned_exercises || []).sort((a, b) => a.order_index - b.order_index),
      }));

      const completedDates = new Set([
        ...(cardioRes.data || []).map(a => a.activity_date),
        ...(wktRes.data || []).map(w => w.workout_date),
      ]);

      const planByDate = {};
      plans.forEach(w => { planByDate[w.workout_date] = w; });

      // Stats
      renderStats(
        cardioRes.data || [],
        (wktRes.data || []).map(w => ({
          workout_date: w.workout_date,
          exercises: w.strava_exercises || [],
        }))
      );

      // Week bar
      const leftCol = document.getElementById("leftCol");
      leftCol.insertAdjacentHTML("beforeend", renderWeekBar(plans, completedDates));

      // Workout list
      const workoutList = document.getElementById("workoutList");
      if (plans.length === 0) {
        workoutList.innerHTML = '<div class="empty-day" style="padding:20px;text-align:center">No upcoming workouts planned</div>';
        return;
      }

      let html = '<div class="section-header">Today</div>';
      const first = plans[0];
      const firstDate = new Date(first.workout_date + "T12:00:00");
      const isToday = first.workout_date === today;
      html += renderDay(
        { label: formatLabel(firstDate) },
        first,
        completedDates.has(first.workout_date),
        isToday
      );

      const upcoming = plans.slice(1);
      if (upcoming.length) {
        html += '<div class="section-header" style="margin-top:16px">Upcoming</div>';
        html += upcoming.map(w => {
          const d = new Date(w.workout_date + "T12:00:00");
          return renderDay(
            { label: formatLabel(d) },
            w,
            completedDates.has(w.workout_date),
            false
          );
        }).join("");
      }

      workoutList.innerHTML = html;
    }

    init();
  </script>
</body>
</html>
