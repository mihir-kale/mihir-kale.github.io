<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, sans-serif;
      background: #000;
      color: #fff;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }
    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
    .header h1 { font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
    .header a { color: #666; font-size: 12px; text-decoration: none; transition: color .2s; }
    .header a:hover { color: #fff; }
    .stats { display: flex; gap: 12px; margin-bottom: 24px; }
    .stat-box { flex: 1; background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 600; color: #fff; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .panel { display: flex; flex-direction: column; gap: 12px; }
    .panel-header { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: #888; padding-bottom: 8px; border-bottom: 1px solid #1a1a1a; }
    .day-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; }
    .day-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 10px; }
    .day-label.today { color: #0a84ff; }
    .day-label.past { color: #333; }
    .workout-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
    .workout-item:last-child { border-bottom: none; }
    .workout-badge {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .workout-badge.run { background: #30d15820; color: #30d158; }
    .workout-badge.strength { background: #ff6b3520; color: #ff6b35; }
    .workout-badge.rest { background: #33333320; color: #666; }
    .workout-info { flex: 1; min-width: 0; }
    .workout-title { font-size: 14px; font-weight: 500; color: #fff; }
    .workout-exercises { margin-top: 6px; }
    .exercise-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
    .exercise-name { color: #ccc; }
    .exercise-detail { color: #888; font-variant-numeric: tabular-nums; }
    .rest-label { font-size: 13px; color: #555; font-style: italic; padding: 4px 0; }
    .empty-day { font-size: 13px; color: #333; padding: 4px 0; }
    .completed-dot { width: 8px; height: 8px; border-radius: 50%; background: #0a84ff; flex-shrink: 0; }
    @media (max-width: 768px) {
      .panels { grid-template-columns: 1fr; }
      .stats { flex-wrap: wrap; }
      .stat-box { min-width: calc(50% - 6px); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Training</h1>
    <a href="/dashboard/">← Dashboard</a>
  </div>

  <div class="stats" id="statsContainer"></div>

  <div class="panels">
    <div class="panel" id="panelLeft"></div>
    <div class="panel" id="panelRight"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://heyrtjzntnicqsfemcmi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhleXJ0anpudG5pY3FzZmVtY21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTU3NDksImV4cCI6MjA5OTM3MTc0OX0.MwivwC-MUgI7J4-bH5ahjuL8YLQYPsR1vzcRVlpoTNo";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DAY_NAMES = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const DAY_NAMES_FULL = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    function todayEt() {
      return new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
    }

    function esc(str) {
      if (!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function getWeekDays() {
      const today = new Date();
      const day = today.getDay();
      const monday = new Date(today);
      monday.setDate(today.getDate() - ((day + 6) % 7));

      const days = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        days.push({
          date: `${y}-${m}-${dd}`,
          label: `${DAY_NAMES[d.getDay()]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`,
          isToday: `${y}-${m}-${dd}` === todayEt(),
          isPast: d < new Date(todayEt() + "T00:00:00") && `${y}-${m}-${dd}` !== todayEt(),
          fullDay: DAY_NAMES_FULL[d.getDay()],
        });
      }
      return days;
    }

    function renderStats(strava) {
      const el = document.getElementById("statsContainer");
      const { cardio, workouts } = strava;

      const now = new Date();
      const weekAgo = new Date(now);
      weekAgo.setDate(now.getDate() - 7);

      const weekCardio = cardio.filter(a => new Date(a.activity_date) >= weekAgo);
      const weekWorkouts = (workouts || []).filter(w => new Date(w.workout_date) >= weekAgo);

      const km = weekCardio.reduce((s, a) => s + (a.distance_km || 0), 0).toFixed(1);
      const sets = weekWorkouts.reduce((s, w) =>
        s + (w.exercises || []).reduce((ss, ex) => ss + (ex.sets || 0), 0), 0);
      const volume = weekWorkouts.reduce((s, w) =>
        s + (w.exercises || []).reduce((ss, ex) => ss + (ex.sets || 0) * (ex.reps || 0) * (ex.weight_kg || 0), 0), 0);
      const sessions = weekWorkouts.length + weekCardio.length;

      el.innerHTML = `
        <div class="stat-box"><div class="stat-value">${km}</div><div class="stat-label">KM this week</div></div>
        <div class="stat-box"><div class="stat-value">${(volume / 1000).toFixed(1)}</div><div class="stat-label">Volume</div></div>
        <div class="stat-box"><div class="stat-value">${sets}</div><div class="stat-label">Sets</div></div>
        <div class="stat-box"><div class="stat-value">${sessions}</div><div class="stat-label">Sessions</div></div>
      `;
    }

    function renderDay(day, workout, completed) {
      const labelClass = day.isToday ? "today" : day.isPast ? "past" : "";
      const todayMarker = day.isToday ? " — TODAY" : "";

      let content = "";
      if (!workout) {
        content = '<div class="empty-day">No workout planned</div>';
      } else if (workout.workout_type === "rest") {
        content = '<div class="rest-label">Active recovery</div>';
      } else {
        const exercises = (workout.exercises || []).map(ex => {
          let detail = "";
          if (workout.workout_type === "run") {
            detail = ex.name || "";
          } else {
            const setsReps = ex.sets && ex.reps ? `${ex.sets}×${ex.reps}` : ex.sets ? `${ex.sets} sets` : "";
            const weight = ex.weight_kg ? ` · ${ex.weight_kg}kg` : "";
            detail = setsReps + weight;
          }
          return `<div class="exercise-row">
            <span class="exercise-name">${esc(ex.name)}</span>
            <span class="exercise-detail">${esc(detail)}</span>
          </div>`;
        }).join("");

        content = exercises ? `<div class="workout-exercises">${exercises}</div>` : "";
      }

      const dot = completed ? '<div class="completed-dot"></div>' : '';

      return `
        <div class="day-card">
          <div class="day-label ${labelClass}">${day.label}${todayMarker}</div>
          ${dot}
          ${workout ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span class="workout-badge ${esc(workout.workout_type)}">${esc(workout.workout_type)}</span>
            <span class="workout-title">${esc(workout.title)}</span>
          </div>` : ""}
          ${content}
        </div>`;
    }

    async function init() {
      const days = getWeekDays();
      const startDate = days[0].date;
      const endDate = days[6].date;

      const [planRes, actRes, wktRes] = await Promise.all([
        db.from("planned_workouts")
          .select("id, title, workout_date, workout_type, planned_exercises(name, sets, reps, weight_kg, order_index)")
          .gte("workout_date", startDate)
          .lte("workout_date", endDate)
          .order("workout_date"),
        db.from("strava_activities")
          .select("activity_date")
          .gte("activity_date", startDate)
          .lte("activity_date", endDate),
        db.from("strava_workouts")
          .select("workout_date")
          .gte("workout_date", startDate)
          .lte("workout_date", endDate),
      ]);

      const plans = (planRes.data || []).map(w => ({
        ...w,
        exercises: (w.planned_exercises || []).sort((a, b) => a.order_index - b.order_index),
      }));
      const completedDates = new Set([
        ...(actRes.data || []).map(a => a.activity_date),
        ...(wktRes.data || []).map(w => w.workout_date),
      ]);

      const planByDate = {};
      plans.forEach(w => { planByDate[w.workout_date] = w; });

      const leftDays = days.slice(0, 4);
      const rightDays = days.slice(4);

      document.getElementById("panelLeft").innerHTML =
        '<div class="panel-header">Mon – Thu</div>' +
        leftDays.map(d => renderDay(d, planByDate[d.date], completedDates.has(d.date))).join("");

      document.getElementById("panelRight").innerHTML =
        '<div class="panel-header">Fri – Sun</div>' +
        rightDays.map(d => renderDay(d, planByDate[d.date], completedDates.has(d.date))).join("");

      // Load strava stats
      try {
        const [cardioRes, workoutRes] = await Promise.all([
          db.from("strava_activities").select("activity_date, distance_km"),
          db.from("strava_workouts").select("workout_date, strava_exercises(sets, reps, weight_kg)")
        ]);
        renderStats({
          cardio: cardioRes.data || [],
          workouts: (workoutRes.data || []).map(w => ({
            workout_date: w.workout_date,
            exercises: w.strava_exercises || [],
          })),
        });
      } catch (e) {
        console.error("Failed to load stats:", e);
      }
    }

    init();
  </script>
</body>
</html>
