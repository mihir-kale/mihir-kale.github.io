<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", -apple-system, sans-serif;
      font-weight: 400;
      background: #000;
      color: #fff;
      padding: 24px;
      max-width: 1400px;
      -webkit-font-smoothing: antialiased;
    }

    .date-header {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 24px;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .widget {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px;
      text-align: left;
    }

    .widget h2 {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #fff;
      margin-bottom: 4px;
    }

    /* Calendar */
    .calendar-list { list-style: none; max-height: 560px; overflow-y: auto; }

    .cal-day {
      margin-bottom: 16px;
    }

    .cal-day:last-child { margin-bottom: 0; }

    .cal-day-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a1a;
    }

    .cal-day-label.today { color: #0a84ff; }

    .cal-event {
      padding: 6px 0;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .cal-event-time {
      font-size: 12px;
      color: #fff;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .cal-event-time.today {
      color: #0a84ff;
    }

    .cal-event-title {
      font-size: 13px;
      color: #fff;
      font-weight: 400;
      flex: 1;
    }

    .cal-event-loc {
      font-size: 10px;
      color: #fff;
      margin-top: 2px;
    }

    /* Tasks */
    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      transition: opacity .2s;
    }

    .task-item:hover { opacity: .7; }

    .task-item:last-child { border-bottom: none; }

    .task-check {
      width: 18px;
      height: 18px;
      border: 1.5px solid #444;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .task-item:hover .task-check {
      border-color: #fff;
    }

    .task-check svg {
      width: 10px;
      height: 10px;
      opacity: 0;
      transition: opacity .2s;
    }

    .task-item:hover .task-check svg {
      opacity: .5;
    }

    .task-title { flex: 1; font-size: 14px; font-weight: 400; color: #fff; }

    .task-due {
      font-size: 11px;
      color: #fff;
      white-space: nowrap;
    }

    .task-due.overdue { color: #ff453a; }

    .task-item.high-priority .task-title { color: #0a84ff; }

    .empty-state {
      padding: 40px 20px;
      color: #fff;
      font-size: 13px;
    }

    .loading {
      padding: 40px 20px;
      color: #fff;
      font-size: 13px;
    }

    /* Strava */
    .strava-section { margin-bottom: 20px; }
    .strava-section:last-child { margin-bottom: 0; }

    .strava-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 10px;
    }

    .stat-row {
      display: flex;
      gap: 12px;
    }

    .stat-box {
      flex: 1;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
    }

    .stat-unit {
      font-size: 11px;
      color: #fff;
      margin-top: 2px;
    }

    .last-run {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 14px;
    }

    .last-run-name {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 6px;
    }

    .last-run-meta {
      font-size: 12px;
      color: #fff;
      display: flex;
      gap: 12px;
    }

    .pr-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .pr-item:last-child { border-bottom: none; }

    .pr-name {
      font-size: 13px;
      color: #fff;
    }

    .pr-weight {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    /* Workout */
    .workout-title {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 4px;
    }

    .workout-date {
      font-size: 11px;
      color: #fff;
      margin-bottom: 12px;
    }

    .workout-exercise {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .workout-exercise:last-child { border-bottom: none; }

    .workout-exercise-name {
      font-size: 13px;
      color: #fff;
      flex: 1;
    }

    .workout-exercise-detail {
      font-size: 12px;
      color: #fff;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .columns {
        grid-template-columns: 1fr;
      }
    }

    /* Auth */
    #authGate { display: none; }
    #loginForm {
      display: none;
      max-width: 320px;
      margin: 120px auto;
    }
    #loginForm h2 {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 24px;
      text-align: left;
      text-transform: none;
      letter-spacing: 0;
    }
    .login-field {
      margin-bottom: 12px;
    }
    .login-field input {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .login-field input:focus {
      border-color: #0a84ff;
    }
    .login-field input::placeholder {
      color: #555;
    }
    .login-btn {
      width: 100%;
      padding: 10px;
      background: #0a84ff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .2s;
    }
    .login-btn:hover { opacity: .85; }
    .login-error {
      color: #ff453a;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
    .logout-btn {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      color: #555;
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .logout-btn:hover {
      color: #fff;
      border-color: #fff;
    }
  </style>
</head>
<body>

  <div id="loginForm">
    <h2>Dashboard</h2>
    <form id="authForm">
      <div class="login-field">
        <input type="email" id="authEmail" placeholder="Email" required />
      </div>
      <div class="login-field">
        <input type="password" id="authPass" placeholder="Password" required />
      </div>
      <button type="submit" class="login-btn">Sign in</button>
      <div class="login-error" id="authError"></div>
    </form>
  </div>

  <div id="authGate">
    <button class="logout-btn" id="logoutBtn">Sign out</button>
    <div class="date-header" id="dateHeader"></div>

    <div class="columns">
    <section class="widget">
      <h2>Calendar</h2>
      <div id="calendarContainer" class="loading">Loading...</div>
    </section>

    <section class="widget">
      <h2>Tasks</h2>
      <div id="tasksContainer" class="loading">Loading...</div>
    </section>

    <div class="right-col">
      <section class="widget">
        <h2>Next Workout</h2>
        <div id="workoutContainer" class="loading">Loading...</div>
      </section>

      <section class="widget">
        <h2>Strava</h2>
        <div id="stravaContainer" class="loading">Loading...</div>
      </section>
    </div>
  </div>
  </div>

  <script>
    const SUPABASE_URL = "https://heyrtjzntnicqsfemcmi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhleXJ0anpudG5pY3FzZmVtY21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTU3NDksImV4cCI6MjA5OTM3MTc0OX0.MwivwC-MUgI7J4-bH5ahjuL8YLQYPsR1vzcRVlpoTNo";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function renderCalendar(events) {
      const el = document.getElementById("calendarContainer");
      const today = new Date().toISOString().slice(0, 10);

      if (!events.length) {
        el.innerHTML = '<div class="empty-state">No upcoming events</div>';
        return;
      }

      const grouped = {};
      events.forEach(ev => {
        const date = ev.start.slice(0, 10);
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(ev);
      });

      const dayNames = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
      const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];

      el.innerHTML = '<ul class="calendar-list">' + Object.entries(grouped).map(([date, evts]) => {
        const d = new Date(date + "T12:00:00");
        const isToday = date === today;
        const label = `${dayNames[d.getDay()]}, ${d.getDate()} ${monthNames[d.getMonth()]}`;

        const items = evts.map(ev => {
          const startTime = new Date(ev.start);
          const timeStr = ev.allDay ? "All day" : startTime.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
          const timeClass = isToday ? "cal-event-time today" : "cal-event-time";
          const loc = ev.location ? `<div class="cal-event-loc">${ev.location}</div>` : "";
          return `<div class="cal-event">
            <span class="${timeClass}">${timeStr}</span>
            <span class="cal-event-title">${ev.title}</span>
          </div>${loc ? `<div style="padding-left:68px">${loc}</div>` : ""}`;
        }).join("");

        return `<li class="cal-day">
          <div class="cal-day-label${isToday ? " today" : ""}">${label}${isToday ? " — TODAY" : ""}</div>
          ${items}
        </li>`;
      }).join("") + "</ul>";
    }

    async function loadCalendar() {
      try {
        const resp = await fetch("data/calendar-events.json");
        if (!resp.ok) throw new Error("No data");
        const data = await resp.json();
        renderCalendar(data.events || []);
      } catch (e) {
        document.getElementById("calendarContainer").innerHTML =
          '<div class="empty-state">No data yet</div>';
      }
    }

    function renderDate() {
      const now = new Date();
      const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
      const months = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
      const day = now.getDate();
      const suffix = (d) => {
        if (d > 3 && d < 21) return "TH";
        switch (d % 10) {
          case 1: return "ST";
          case 2: return "ND";
          case 3: return "RD";
          default: return "TH";
        }
      };
      document.getElementById("dateHeader").textContent =
        `${days[now.getDay()]}, ${day}${suffix(day)} ${months[now.getMonth()]}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function isOverdue(dateStr) {
      if (!dateStr) return false;
      const today = new Date().toISOString().slice(0, 10);
      return dateStr < today;
    }

    function renderTasks(tasks) {
      const el = document.getElementById("tasksContainer");

      if (!tasks.length) {
        el.innerHTML = '<div class="empty-state">All clear</div>';
        return;
      }

      el.innerHTML = '<ul class="task-list">' + tasks.map(t => {
        const dueClass = isOverdue(t.due_date) ? "overdue" : "";
        const dueText = t.due_date ? formatDate(t.due_date) : "";
        const priorityClass = t.priority === "high" ? "high-priority" : "";
        return `<li class="task-item ${priorityClass}" data-id="${t.id}">
          <div class="task-check">
            <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2">
              <polyline points="2 6 5 9 10 3"/>
            </svg>
          </div>
          <span class="task-title">${t.title}</span>
          ${dueText ? `<span class="task-due ${dueClass}">${dueText}</span>` : ""}
        </li>`;
      }).join("") + "</ul>";

      el.querySelectorAll(".task-item").forEach(item => {
        item.addEventListener("click", () => completeTask(item.dataset.id, item));
      });
    }

    async function completeTask(id, item) {
      item.style.opacity = "0.4";
      item.style.pointerEvents = "none";
      try {
        await db.from("nodes").update({ status: "done" }).eq("id", id);
        setTimeout(() => item.remove(), 300);
      } catch (e) {
        console.error("Failed to complete task:", e);
        item.style.opacity = "1";
        item.style.pointerEvents = "auto";
      }
    }

    async function loadTasks() {
      try {
        const { data, error } = await db.from("nodes")
          .select("id, parent_id, title, status, priority, due_date");

        if (error) throw error;
        const all = data || [];

        const parentIds = new Set(all.filter(n => n.parent_id).map(n => n.parent_id));

        const pending = all
          .filter(n => n.status !== "done" && !parentIds.has(n.id))
          .sort((a, b) => (a.due_date || "").localeCompare(b.due_date || ""));

        renderTasks(pending);
      } catch (e) {
        console.error("Failed to load tasks:", e);
        document.getElementById("tasksContainer").innerHTML =
          '<div class="empty-state">Failed to load</div>';
      }
    }

    function getWeekBounds() {
      const now = new Date();
      const day = now.getDay();
      const start = new Date(now);
      start.setDate(now.getDate() - day);
      start.setHours(0, 0, 0, 0);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      end.setHours(23, 59, 59, 999);
      return { start, end };
    }

    function renderStrava(data) {
      const el = document.getElementById("stravaContainer");
      const { cardio, summary } = data;

      const { start, end } = getWeekBounds();
      const weekActivities = cardio.filter(a => {
        const d = new Date(a.date + "T00:00:00");
        return d >= start && d <= end;
      });
      const weekDist = weekActivities.reduce((s, a) => s + a.distance_km, 0).toFixed(1);
      const weekTime = (weekActivities.reduce((s, a) => s + a.moving_time_min, 0) / 60).toFixed(1);
      const weekCount = weekActivities.length;

      const lastRun = cardio[cardio.length - 1];
      const lastPace = lastRun.avg_speed_kmh
        ? (60 / lastRun.avg_speed_kmh).toFixed(1)
        : "—";

      const prs = Object.values(summary.pr_lifts)
        .sort((a, b) => b.weight_kg - a.weight_kg)
        .slice(0, 4);

      el.innerHTML = `
        <div class="strava-section">
          <div class="strava-label">This Week</div>
          <div class="stat-row">
            <div class="stat-box">
              <div class="stat-value">${weekCount}</div>
              <div class="stat-unit">runs</div>
            </div>
            <div class="stat-box">
              <div class="stat-value">${weekDist}</div>
              <div class="stat-unit">km</div>
            </div>
            <div class="stat-box">
              <div class="stat-value">${weekTime}</div>
              <div class="stat-unit">hrs</div>
            </div>
          </div>
        </div>

        <div class="strava-section">
          <div class="strava-label">Last Run</div>
          <div class="last-run">
            <div class="last-run-name">${lastRun.name}</div>
            <div class="last-run-meta">
              <span>${lastRun.distance_km} km</span>
              <span>${lastRun.moving_time_min} min</span>
              <span>${lastPace} /km</span>
              <span>${lastRun.date}</span>
            </div>
          </div>
        </div>

        <div class="strava-section">
          <div class="strava-label">Top PRs</div>
          ${prs.map(p => `
            <div class="pr-item">
              <span class="pr-name">${p.name}</span>
              <span class="pr-weight">${p.weight_kg} kg</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    async function loadStrava() {
      try {
        const resp = await fetch("data/fitness-data.json");
        if (!resp.ok) throw new Error("No data");
        const data = await resp.json();
        renderStrava(data);
      } catch (e) {
        document.getElementById("stravaContainer").innerHTML =
          '<div class="empty-state">No data yet</div>';
      }
    }

    async function loadWorkout() {
      const el = document.getElementById("workoutContainer");
      try {
        const today = new Date().toISOString().slice(0, 10);
        const { data: workouts, error } = await db.from("planned_workouts")
          .select("id, title, workout_date, workout_type")
          .gte("workout_date", today)
          .order("workout_date", { ascending: true })
          .limit(1);

        if (error) throw error;
        if (!workouts || !workouts.length) {
          el.innerHTML = '<div class="empty-state">No workouts planned</div>';
          return;
        }

        const w = workouts[0];
        const { data: exercises } = await db.from("planned_exercises")
          .select("name, sets, reps, duration_min, target_weight_kg, target_pace_min_km")
          .eq("workout_id", w.id)
          .order("order_index", { ascending: true });

        const d = new Date(w.workout_date + "T12:00:00");
        const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const dateStr = `${dayNames[d.getDay()]}, ${d.toLocaleDateString("en-US", { month: "short", day: "numeric" })}`;

        const exList = (exercises || []).map(ex => {
          let detail = "";
          if (w.workout_type === "cardio" || w.workout_type === "run") {
            detail = ex.duration_min && ex.target_pace_min_km
              ? `${ex.duration_min} min @ ${ex.target_pace_min_km} /km`
              : ex.duration_min ? `${ex.duration_min} min` : "";
          } else {
            const setsReps = ex.sets && ex.reps ? `${ex.sets}×${ex.reps}` : "";
            const weight = ex.target_weight_kg ? ` @ ${ex.target_weight_kg}kg` : "";
            detail = setsReps + weight;
          }
          return `<div class="workout-exercise">
            <span class="workout-exercise-name">${ex.name}</span>
            <span class="workout-exercise-detail">${detail}</span>
          </div>`;
        }).join("");

        el.innerHTML = `
          <div class="workout-title">${w.title}</div>
          <div class="workout-date">${dateStr}</div>
          ${exList || '<div class="empty-state">No exercises added</div>'}
        `;
      } catch (e) {
        console.error("Failed to load workout:", e);
        el.innerHTML = '<div class="empty-state">Failed to load</div>';
      }
    }

    function showDashboard() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("authGate").style.display = "block";
      renderDate();
      loadTasks();
      loadStrava();
      loadCalendar();
      loadWorkout();
    }

    function showLogin() {
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("authGate").style.display = "none";
    }

    document.getElementById("authForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("authEmail").value;
      const pass = document.getElementById("authPass").value;
      const errEl = document.getElementById("authError");
      errEl.style.display = "none";

      const { error } = await db.auth.signInWithPassword({ email, password: pass });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = "block";
      } else {
        showDashboard();
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await db.auth.signOut();
      showLogin();
    });

    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        showDashboard();
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
