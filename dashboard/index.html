<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", -apple-system, sans-serif;
      font-weight: 400;
      background: #000;
      color: #fff;
      padding: 24px;
      max-width: 1400px;
      -webkit-font-smoothing: antialiased;
    }

    .date-header {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .left-col, .right-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .widget {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px;
      text-align: left;
    }

    .widget h2 {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #fff;
      margin-bottom: 4px;
    }
    .widget h2 a {
      color: inherit;
      text-decoration: none;
    }
    .widget h2 a:hover {
      color: #0a84ff;
    }

    /* Calendar */
    .calendar-list { list-style: none; max-height: 560px; overflow-y: auto; }

    .cal-day {
      margin-bottom: 16px;
    }

    .cal-day:last-child { margin-bottom: 0; }

    .cal-day-label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a1a;
    }

    .cal-day-label.today { color: #0a84ff; }

    .cal-event {
      padding: 6px 0;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .cal-event-time {
      font-size: 14px;
      color: #fff;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .cal-event-time.today {
      color: #0a84ff;
    }

    .cal-event-title {
      font-size: 15px;
      color: #fff;
      font-weight: 400;
      flex: 1;
    }

    .cal-event-loc {
      font-size: 12px;
      color: #fff;
      margin-top: 2px;
    }

    /* Tasks */
    .task-parent {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #0a84ff;
      margin-bottom: 6px;
      margin-top: 12px;
    }

    .task-parent:first-child {
      margin-top: 0;
    }

    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      transition: opacity .2s;
    }

    .task-item:hover { opacity: .7; }

    .task-item:last-child { border-bottom: none; }

    .task-check {
      width: 18px;
      height: 18px;
      border: 1.5px solid #444;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .task-item:hover .task-check {
      border-color: #fff;
    }

    .task-check svg {
      width: 10px;
      height: 10px;
      opacity: 0;
      transition: opacity .2s;
    }

    .task-item:hover .task-check svg {
      opacity: .5;
    }

    .task-title { flex: 1; font-size: 14px; font-weight: 400; color: #fff; }

    .task-due {
      font-size: 11px;
      color: #fff;
      white-space: nowrap;
    }

    .task-due.overdue { color: #ff453a; }

    .task-item.high-priority .task-title { color: #0a84ff; }

    .task-add-btn {
      opacity: 0;
      background: none;
      border: none;
      color: #666;
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      transition: opacity .2s, color .2s;
      flex-shrink: 0;
    }
    .task-item:hover .task-add-btn { opacity: 1; }
    .task-add-btn:hover { color: #fff; }

    .task-child-input {
      display: flex;
      gap: 6px;
      padding: 6px 0 6px 32px;
    }
    .task-child-input input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }
    .task-child-input input::placeholder { color: #666; }
    .task-child-input input:focus { outline: none; border-color: #444; }

    .empty-state {
      padding: 40px 20px;
      color: #fff;
      font-size: 13px;
    }

    .loading {
      padding: 40px 20px;
      color: #fff;
      font-size: 13px;
    }

    /* Strava */
    .stat-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .stat-box {
      flex: 1;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
    }

    .stat-unit {
      font-size: 11px;
      color: #fff;
      margin-top: 2px;
    }

    .last-run {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 14px;
    }

    .last-run-name {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 6px;
    }

    .last-run-meta {
      font-size: 12px;
      color: #fff;
      display: flex;
      gap: 12px;
    }

    .pr-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .pr-item:last-child { border-bottom: none; }

    .pr-name {
      font-size: 13px;
      color: #fff;
    }

    .pr-weight {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    /* Workout Card */
    .workout-card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #222;
      margin-top: 8px;
    }

    .workout-card-header {
      padding: 16px 18px 12px;
      background: linear-gradient(135deg, #0a84ff22 0%, #0a84ff0a 100%);
      border-bottom: 1px solid #1e1e1e;
    }

    .workout-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .workout-card-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .workout-card-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #0a84ff28;
      color: #0a84ff;
    }

    .workout-card-badge.strength { background: #ff6b3520; color: #ff6b35; }
    .workout-card-badge.cardio   { background: #0a84ff20; color: #0a84ff; }
    .workout-card-badge.run      { background: #30d15820; color: #30d158; }

    .workout-card-date {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .workout-card-exercises {
      padding: 6px 0;
    }

    .workout-card-exercise {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid #1a1a1a;
    }

    .workout-card-exercise:last-child { border-bottom: none; }

    .workout-card-exercise-name {
      font-size: 13px;
      color: #fff;
      font-weight: 400;
    }

    .workout-card-exercise-detail {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 900px) {
      .columns {
        grid-template-columns: 1fr;
      }
    }

    /* Auth */
    #authGate { display: none; }
    #loginForm {
      display: none;
      max-width: 320px;
      margin: 120px auto;
    }
    #loginForm h2 {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 24px;
      text-align: left;
      text-transform: none;
      letter-spacing: 0;
    }
    .login-field {
      margin-bottom: 12px;
    }
    .login-field input {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .login-field input:focus {
      border-color: #0a84ff;
    }
    .login-field input::placeholder {
      color: #555;
    }
    .login-btn {
      width: 100%;
      padding: 10px;
      background: #0a84ff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .2s;
    }
    .login-btn:hover { opacity: .85; }
    .login-error {
      color: #ff453a;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* Nutrition widget */
    .nutrition-widget { padding: 0; }
    .nutrition-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 16px 18px 0; }
    .nutrition-header h2 { margin: 0; }
    .chevron { font-size: 14px; transition: transform 0.2s; color: var(--text); }
    .nutrition-widget.collapsed .nutrition-header { padding-bottom: 16px; }
    .nutrition-widget.collapsed .chevron { transform: rotate(-90deg); }
    .nutrition-body { overflow: hidden; max-height: 200px; transition: max-height 0.2s ease, padding 0.2s ease; padding: 0 18px 14px; }
    .nutrition-widget.collapsed .nutrition-body { max-height: 0; padding: 0 18px 0; }
    .nutrition-entry { display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid #2a2a2a; font-size: 13px; }
    .nutrition-entry:first-child { border-top: 1px solid #2a2a2a; margin-top: 6px; }
    .nutrition-entry .food-name { font-weight: 500; }
    .nutrition-entry .macros { color: var(--text-muted); }
    .nutrition-empty { color: var(--text-muted); font-size: 13px; margin-top: 8px; }

    .meal-next {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .meal-next:hover { background: #222; }
    .meal-next.logged { opacity: 0.4; pointer-events: none; }
    .meal-next-check {
      width: 18px;
      height: 18px;
      border: 1.5px solid #444;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }
    .meal-next:hover .meal-next-check { border-color: #fff; }
    .meal-next.logged .meal-next-check { background: #0a84ff; border-color: #0a84ff; }
    .meal-next-check svg {
      width: 10px;
      height: 10px;
      opacity: 0;
      transition: opacity .2s;
    }
    .meal-next:hover .meal-next-check svg { opacity: .5; }
    .meal-next.logged .meal-next-check svg { opacity: 1; }
    .meal-next-info { flex: 1; min-width: 0; }
    .meal-snack { background: none; padding: 0; border-radius: 0; }
    .meal-next-name { font-size: 13px; font-weight: 500; color: #fff; }
    .meal-next-macro { font-size: 12px; color: #888; margin-top: 2px; }
    .meal-snack .meal-next-info { display: flex; gap: 6px; align-items: center; }
    .meal-snack-name, .meal-snack-cal {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
      padding: 0;
      outline: none;
      min-width: 0;
    }
    .meal-snack-name { flex: 1; }
    .meal-snack-name::placeholder, .meal-snack-cal::placeholder { color: #555; }
    .meal-snack-cal { width: 50px; text-align: right; font-variant-numeric: tabular-nums; }

    /* Read widget */
    .read-widget { padding: 0; }
    .read-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 16px 18px 0; }
    .read-header h2 { margin: 0; }
    .read-body { overflow: hidden; max-height: 400px; transition: max-height 0.2s ease, padding 0.2s ease; padding: 0 18px 14px; }
    .read-widget.collapsed .read-header { padding-bottom: 16px; }
    .read-widget.collapsed .read-body { max-height: 0; padding: 0 18px 0; }
    .read-widget.collapsed .chevron { transform: rotate(-90deg); }
    .read-item { padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .read-item:last-child { border-bottom: none; }
    .read-item a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 400; transition: color 0.2s; }
    .read-item a:hover { color: #0a84ff; }
    .read-item .read-source { font-size: 11px; color: #666; margin-top: 2px; }

    /* Listen widget */
    .listen-widget { padding: 0; }
    .listen-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 16px 18px 0; }
    .listen-header h2 { margin: 0; }
    .listen-status { font-size: 13px; color: #0a84ff; font-weight: 500; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .listen-body { overflow: hidden; max-height: 200px; transition: max-height 0.2s ease, padding 0.2s ease; padding: 0 18px 14px; }
    .listen-widget.collapsed .listen-header { padding-bottom: 16px; }
    .listen-widget.collapsed .listen-body { max-height: 0; padding: 0 18px 0; }
    .listen-widget.collapsed .chevron { transform: rotate(-90deg); }
    .listen-connect { font-size: 13px; color: var(--text-muted); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
    .listen-connect:hover { color: #fff; }
    .listen-track { padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .listen-track:last-child { border-bottom: none; }
    .listen-track-name { font-size: 14px; font-weight: 400; color: #fff; }
    .listen-track-artist { font-size: 11px; color: #666; margin-top: 2px; }

    /* Top bar & Focus button */
    .header-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
    .header-actions { display: flex; gap: 8px; }
    .focus-btn, .logout-btn {
      background: none;
      border: 1px solid #333;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .focus-btn:hover, .logout-btn:hover {
      color: #fff;
      border-color: #fff;
    }
    .focus-btn.active {
      color: #0a84ff;
      border-color: #0a84ff;
    }

    /* Pomodoro timer */
    .pomodoro-timer {
      font-size: 48px;
      font-weight: 300;
      text-align: center;
      padding: 16px 0 12px;
      font-variant-numeric: tabular-nums;
    }
    .pomodoro-controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      padding-bottom: 14px;
    }
    .pomodoro-btn {
      background: none;
      border: 1px solid #333;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 16px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .pomodoro-btn:hover {
      color: #fff;
      border-color: #fff;
    }

    /* Focus mode — hide everything except calendar & tasks */
    body.focus-mode .right-col,
    body.focus-mode .left-col .read-widget,
    body.focus-mode .left-col .listen-widget {
      display: none !important;
    }
    body.focus-mode .left-col {
      flex: 1;
    }
    body.focus-mode .pomodoro-widget {
      display: block !important;
    }
  </style>
</head>
<body>

  <div id="loginForm">
    <h2>Dashboard</h2>
    <form id="authForm">
      <div class="login-field">
        <input type="email" id="authEmail" placeholder="Email" required />
      </div>
      <div class="login-field">
        <input type="password" id="authPass" placeholder="Password" required />
      </div>
      <button type="submit" class="login-btn">Sign in</button>
      <div class="login-error" id="authError"></div>
    </form>
  </div>

  <div id="authGate">
    <div class="header-row">
      <div class="date-header" id="dateHeader"></div>
      <div class="header-actions">
        <button class="focus-btn" id="focusBtn">Focus</button>
        <button class="logout-btn" id="logoutBtn">Sign out</button>
      </div>
    </div>

    <div class="columns">
    <div class="left-col">
      <section class="widget">
        <h2>Calendar</h2>
        <div id="calendarContainer" class="loading">Loading...</div>
      </section>

      <section class="widget pomodoro-widget" id="pomodoroWidget" style="display:none">
        <h2>Focus</h2>
        <div class="pomodoro-timer" id="pomodoroTimer">25:00</div>
        <div class="pomodoro-controls">
          <button class="pomodoro-btn" id="pomodoroStart">Start</button>
          <button class="pomodoro-btn" id="pomodoroPause" style="display:none">Pause</button>
          <button class="pomodoro-btn" id="pomodoroReset">Reset</button>
        </div>
      </section>

      <section class="widget read-widget collapsed">
        <div class="read-header" id="readToggle">
          <h2>Read</h2>
          <span class="chevron">&#9662;</span>
        </div>
        <div class="read-body" id="readBody">
          <div id="readList"></div>
        </div>
      </section>

      <section class="widget listen-widget collapsed">
        <div class="listen-header" id="listenToggle">
          <h2>Listen</h2>
          <span class="listen-status" id="listenStatus"></span>
          <span class="chevron">&#9662;</span>
        </div>
        <div class="listen-body" id="listenBody">
          <div id="listenConnect"></div>
          <div id="listenTopTracks"></div>
        </div>
      </section>
    </div>

    <section class="widget">
      <h2><a href="/tracker/">Tasks</a></h2>
      <div id="tasksContainer" class="loading">Loading...</div>
    </section>

    <div class="right-col">
      <section class="widget">
        <h2>Training</h2>
        <div id="workoutContainer" class="loading">Loading...</div>
        <div id="stravaContainer"></div>
      </section>

      <section class="widget nutrition-widget collapsed">
        <div class="nutrition-header" id="nutritionToggle">
          <h2>Nutrition</h2>
          <span class="chevron" id="nutritionChevron">&#9662;</span>
        </div>
        <div class="nutrition-body" id="nutritionBody">
          <div id="mealQueue"></div>
        </div>
      </section>
    </div>
  </div>
  </div>

  <script>
    const SUPABASE_URL = "https://heyrtjzntnicqsfemcmi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhleXJ0anpudG5pY3FzZmVtY21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTU3NDksImV4cCI6MjA5OTM3MTc0OX0.MwivwC-MUgI7J4-bH5ahjuL8YLQYPsR1vzcRVlpoTNo";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ── Utilities ─────────────────────────────────── */
    const DAY_NAMES = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
    const MONTH_NAMES = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    const DAY_NAMES_FULL = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
    const MONTH_NAMES_FULL = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

    function esc(str) {
      if (!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function todayEt() {
      return new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
    }

    function generateId() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      const values = crypto.getRandomValues(new Uint8Array(21));
      return values.reduce((acc, x) => acc + chars[x & 63], "");
    }

    function isOverdue(dateStr) {
      if (!dateStr) return false;
      return dateStr < todayEt();
    }

    async function fetchWithRetry(url, retries = 2) {
      for (let i = 0; i <= retries; i++) {
        try {
          const resp = await fetch(url);
          if (!resp.ok) throw new Error(resp.status);
          return resp;
        } catch (e) {
          if (i === retries) throw e;
          await new Promise(r => setTimeout(r, 1000 * (i + 1)));
        }
      }
    }

    function renderCalendar(events) {
      const el = document.getElementById("calendarContainer");
      const today = todayEt();
      const cutoff = new Date(today + "T12:00:00");
      cutoff.setDate(cutoff.getDate() + 5);
      const cutoffStr = cutoff.toISOString().slice(0, 10);

      const filtered = events.filter(ev => {
        const date = ev.start.slice(0, 10);
        return date >= today && date <= cutoffStr;
      });

      if (!filtered.length) {
        el.innerHTML = '<div class="empty-state">No upcoming events</div>';
        return;
      }

      const grouped = {};
      filtered.forEach(ev => {
        const date = ev.start.slice(0, 10);
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(ev);
      });

      el.innerHTML = '<ul class="calendar-list">' + Object.entries(grouped).map(([date, evts]) => {
        const d = new Date(date + "T12:00:00");
        const isToday = date === today;
        const label = `${DAY_NAMES[d.getDay()]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;

        const items = evts.map(ev => {
          const startTime = new Date(ev.start);
          const timeStr = ev.allDay ? "All day" : startTime.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
          const timeClass = isToday ? "cal-event-time today" : "cal-event-time";
          const loc = ev.location ? `<div class="cal-event-loc">${esc(ev.location)}</div>` : "";
          return `<div class="cal-event">
            <span class="${timeClass}">${esc(timeStr)}</span>
            <span class="cal-event-title">${esc(ev.title)}</span>
          </div>${loc ? `<div style="padding-left:68px">${loc}</div>` : ""}`;
        }).join("");

        return `<li class="cal-day">
          <div class="cal-day-label${isToday ? " today" : ""}">${label}${isToday ? " — TODAY" : ""}</div>
          ${items}
        </li>`;
      }).join("") + "</ul>";
    }

    function renderDate() {
      const now = new Date();
      const day = now.getDate();
      const suffix = (d) => {
        if (d > 3 && d < 21) return "TH";
        switch (d % 10) {
          case 1: return "ST";
          case 2: return "ND";
          case 3: return "RD";
          default: return "TH";
        }
      };
      document.getElementById("dateHeader").textContent =
        `${DAY_NAMES_FULL[now.getDay()]}, ${day}${suffix(day)} ${MONTH_NAMES_FULL[now.getMonth()]}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function renderTasks(grouped) {
      const el = document.getElementById("tasksContainer");
      const totalTasks = Object.values(grouped).reduce((s, arr) => s + arr.length, 0);

      if (!totalTasks) {
        el.innerHTML = '<div class="empty-state">All clear</div>';
        return;
      }

      let html = "";
      for (const [parent, tasks] of Object.entries(grouped)) {
        if (parent) {
          html += `<div class="task-parent">${esc(parent)}</div>`;
        }
        html += '<ul class="task-list">' + tasks.map(t => {
          const dueClass = isOverdue(t.due_date) ? "overdue" : "";
          const dueText = t.due_date ? formatDate(t.due_date) : "";
          const priorityClass = t.priority === "high" ? "high-priority" : "";
          return `<li class="task-item ${priorityClass}" data-id="${esc(t.id)}" role="button" tabindex="0" aria-label="Complete task: ${esc(t.title)}">
            <div class="task-check">
              <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2">
                <polyline points="2 6 5 9 10 3"/>
              </svg>
            </div>
            <span class="task-title">${esc(t.title)}</span>
            ${dueText ? `<span class="task-due ${dueClass}">${dueText}</span>` : ""}
            <button class="task-add-btn" data-parent-id="${esc(t.id)}" aria-label="Add subtask to ${esc(t.title)}">+</button>
          </li>`;
        }).join("") + "</ul>";
      }

      el.innerHTML = html;

      el.querySelectorAll(".task-item").forEach(item => {
        item.addEventListener("click", (e) => {
          if (e.target.closest(".task-add-btn")) return;
          completeTask(item.dataset.id, item);
        });
        item.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            completeTask(item.dataset.id, item);
          }
        });
      });

      el.querySelectorAll(".task-add-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const existing = el.querySelector(".task-child-input");
          if (existing) existing.remove();
          const li = btn.closest(".task-item");
          const inputRow = document.createElement("div");
          inputRow.className = "task-child-input";
          inputRow.innerHTML = `<input type="text" placeholder="Add subtask..." autofocus />`;
          li.after(inputRow);
          const input = inputRow.querySelector("input");
          input.focus();
          input.addEventListener("keydown", async (ev) => {
            if (ev.key === "Enter") {
              const title = input.value.trim();
              if (!title) return;
              input.disabled = true;
              try {
                await addTask(title, btn.dataset.parentId);
                inputRow.remove();
              } catch (err) {
                console.error("Failed to add task:", err);
                input.disabled = false;
              }
            } else if (ev.key === "Escape") {
              inputRow.remove();
            }
          });
          input.addEventListener("blur", () => {
            setTimeout(() => inputRow.remove(), 150);
          });
        });
      });
    }

    async function addTask(title, parentId = null) {
      const id = generateId();
      const now = new Date().toISOString();

      let parentPath = "";
      if (parentId) {
        const { data: parent } = await db.from("nodes").select("path").eq("id", parentId).single();
        parentPath = parent?.path || "";
      }

      const path = parentId ? `${parentPath}/${id}` : `/${id}`;

      const { count } = await db.from("nodes")
        .select("id", { count: "exact", head: true })
        .eq("parent_id", parentId);

      const { error } = await db.from("nodes").insert({
        id,
        parent_id: parentId,
        path,
        title,
        description: "",
        status: "ready",
        priority: "medium",
        order_index: count || 0,
        hidden_today: false,
        recurring: false,
        created_at: now,
        updated_at: now,
      });
      if (error) throw error;
      await loadTasks();
    }

    async function loadTasks() {
      try {
        const { data, error } = await db.from("nodes")
          .select("id, parent_id, title, status, priority, due_date");

        if (error) throw error;
        const all = data || [];

        const counts = { completed: 0, pending: 0, in_progress: 0, total: all.length };
        for (const n of all) {
          if (n.status === "done") counts.completed++;
          else if (n.status === "in_progress") counts.in_progress++;
          else counts.pending++;
        }
        updateDailyLogs(counts);

        const byId = {};
        all.forEach(n => byId[n.id] = n);

        const childCount = {};
        all.forEach(n => {
          if (n.parent_id && n.status !== "done") childCount[n.parent_id] = (childCount[n.parent_id] || 0) + 1;
        });

        const pending = all
          .filter(n => n.status !== "done" && !childCount[n.id])
          .sort((a, b) => (a.due_date || "").localeCompare(b.due_date || ""));

        const grouped = {};
        pending.forEach(n => {
          const parent = n.parent_id && byId[n.parent_id] ? byId[n.parent_id].title : null;
          if (!grouped[parent || ""]) grouped[parent || ""] = [];
          grouped[parent || ""].push(n);
        });

        renderTasks(grouped);
      } catch (e) {
        console.error("Failed to load tasks:", e);
        document.getElementById("tasksContainer").innerHTML =
          '<div class="empty-state">Failed to load</div>';
      }
    }

    function getWeekBounds() {
      const now = new Date();
      const day = now.getDay();
      const start = new Date(now);
      start.setDate(now.getDate() - day);
      start.setHours(0, 0, 0, 0);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      end.setHours(23, 59, 59, 999);
      return { start, end };
    }

    function renderStrava(data) {
      const el = document.getElementById("stravaContainer");
      const { cardio, workouts } = data;

      const { start, end } = getWeekBounds();
      const weekCardio = cardio.filter(a => {
        const d = new Date(a.date + "T00:00:00");
        return d >= start && d <= end;
      });
      const totalKm = weekCardio.reduce((s, a) => s + a.distance_km, 0).toFixed(1);

      const weekWorkouts = (workouts || []).filter(w => {
        const d = new Date(w.date + "T00:00:00");
        return d >= start && d <= end;
      });
      const totalSets = weekWorkouts.reduce((s, w) =>
        s + (w.exercises || []).reduce((ss, ex) => ss + (ex.sets || 0), 0), 0);
      const totalVolume = weekWorkouts.reduce((s, w) =>
        s + (w.exercises || []).reduce((ss, ex) => ss + (ex.sets || 0) * (ex.reps || 0) * (ex.weight_kg || 0), 0), 0);

      el.innerHTML = `
        <div class="stat-row">
          <div class="stat-box">
            <div class="stat-value">${totalKm}</div>
            <div class="stat-unit">KM</div>
          </div>
          <div class="stat-box">
            <div class="stat-value">${(totalVolume / 1000).toFixed(1)}</div>
            <div class="stat-unit">VOLUME</div>
          </div>
          <div class="stat-box">
            <div class="stat-value">${totalSets}</div>
            <div class="stat-unit">SETS</div>
          </div>
        </div>
      `;
    }

    /* ── Listen widget (Spotify) ─────────────────── */
    const SPOTIFY_CLIENT_ID = "3671d178bb3a45fa83badb1087ccf849";
    const SPOTIFY_REDIRECT_URI = "https://mihir-kale.github.io/dashboard/";
    const SPOTIFY_SCOPES = "user-read-currently-playing user-top-read";
    const SPOTIFY_AUTH_URL = "https://accounts.spotify.com/authorize";
    const SPOTIFY_TOKEN_URL = "https://accounts.spotify.com/api/token";

    const listenToggle = document.getElementById("listenToggle");
    const listenWidget = listenToggle.closest(".listen-widget");
    listenToggle.addEventListener("click", () => {
      listenWidget.classList.toggle("collapsed");
    });

    function generateRandomString(length) {
      const possible = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      const values = crypto.getRandomValues(new Uint8Array(length));
      return values.reduce((acc, x) => acc + possible[x % possible.length], "");
    }

    async function sha256(plain) {
      const encoder = new TextEncoder();
      const data = encoder.encode(plain);
      return window.crypto.subtle.digest("SHA-256", data);
    }

    function base64encode(input) {
      return btoa(String.fromCharCode(...new Uint8Array(input)))
        .replace(/=/g, "")
        .replace(/\+/g, "-")
        .replace(/\//g, "_");
    }

    async function spotifyLogin() {
      const codeVerifier = generateRandomString(64);
      localStorage.setItem("spotify_code_verifier", codeVerifier);
      const codeChallenge = base64encode(await sha256(codeVerifier));

      const params = new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        response_type: "code",
        redirect_uri: SPOTIFY_REDIRECT_URI,
        scope: SPOTIFY_SCOPES,
        code_challenge_method: "S256",
        code_challenge: codeChallenge,
      });

      window.location.href = SPOTIFY_AUTH_URL + "?" + params.toString();
    }

    async function spotifyExchangeCode(code) {
      const codeVerifier = localStorage.getItem("spotify_code_verifier");
      const body = new URLSearchParams({
        grant_type: "authorization_code",
        code,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        client_id: SPOTIFY_CLIENT_ID,
        code_verifier: codeVerifier,
      });

      const resp = await fetch(SPOTIFY_TOKEN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body,
      });

      if (!resp.ok) throw new Error("Token exchange failed");
      const data = await resp.json();
      localStorage.setItem("spotify_access_token", data.access_token);
      localStorage.setItem("spotify_refresh_token", data.refresh_token);
      localStorage.setItem("spotify_token_expires", Date.now() + data.expires_in * 1000);
      return data;
    }

    async function spotifyRefreshToken() {
      const refreshToken = localStorage.getItem("spotify_refresh_token");
      if (!refreshToken) return null;

      const body = new URLSearchParams({
        grant_type: "refresh_token",
        refresh_token: refreshToken,
        client_id: SPOTIFY_CLIENT_ID,
      });

      const resp = await fetch(SPOTIFY_TOKEN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body,
      });

      if (!resp.ok) return null;
      const data = await resp.json();
      localStorage.setItem("spotify_access_token", data.access_token);
      localStorage.setItem("spotify_token_expires", Date.now() + data.expires_in * 1000);
      if (data.refresh_token) localStorage.setItem("spotify_refresh_token", data.refresh_token);
      return data.access_token;
    }

    async function getSpotifyToken() {
      const token = localStorage.getItem("spotify_access_token");
      const expires = parseInt(localStorage.getItem("spotify_token_expires") || "0");
      if (token && Date.now() < expires - 60000) return token;
      return await spotifyRefreshToken();
    }

    async function loadCurrentlyPlaying() {
      const statusEl = document.getElementById("listenStatus");
      const token = await getSpotifyToken();
      if (!token) {
        statusEl.innerHTML = "";
        document.getElementById("listenConnect").innerHTML =
          '<button class="listen-connect">Connect Spotify</button>';
        document.getElementById("listenConnect").querySelector("button").addEventListener("click", spotifyLogin);
        return;
      }

      try {
        const resp = await fetch("https://api.spotify.com/v1/me/player/currently-playing", {
          headers: { Authorization: "Bearer " + token },
        });

        if (resp.status === 204 || resp.status === 202) {
          statusEl.textContent = "";
          return;
        }

        if (!resp.ok) {
          statusEl.textContent = "";
          return;
        }

        const data = await resp.json();
        if (!data || !data.is_playing || !data.item) {
          statusEl.textContent = "";
          return;
        }

        statusEl.textContent = data.item.name;
        statusEl.title = data.item.name;
      } catch (e) {
        statusEl.textContent = "";
      }
    }

    async function loadTopTracks() {
      const el = document.getElementById("listenTopTracks");
      const connectEl = document.getElementById("listenConnect");
      const token = await getSpotifyToken();
      if (!token) {
        connectEl.innerHTML = "";
        return;
      }

      try {
        const resp = await fetch("https://api.spotify.com/v1/me/top/tracks?time_range=short_term&limit=3", {
          headers: { Authorization: "Bearer " + token },
        });

        if (!resp.ok) {
          el.innerHTML = "";
          return;
        }

        const data = await resp.json();
        if (!data.items || !data.items.length) {
          el.innerHTML = "";
          return;
        }

        el.innerHTML = data.items.map(track => `
          <div class="listen-track">
            <div class="listen-track-name">${esc(track.name)}</div>
            <div class="listen-track-artist">${esc(track.artists.map(a => a.name).join(", "))}</div>
          </div>
        `).join("");
      } catch (e) {
        el.innerHTML = "";
      }
    }

    // Handle Spotify OAuth callback (must be after spotifyExchangeCode is defined)
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      if (code) {
        try {
          await spotifyExchangeCode(code);
          window.history.replaceState({}, document.title, window.location.pathname);
        } catch (e) {
          console.error("Spotify auth failed:", e);
        }
      }
    })();

    /* ── Focus mode & Pomodoro timer ─────────────── */
    const focusBtn = document.getElementById("focusBtn");
    const pomodoroWidget = document.getElementById("pomodoroWidget");
    const pomodoroTimer = document.getElementById("pomodoroTimer");
    const pomodoroStart = document.getElementById("pomodoroStart");
    const pomodoroPause = document.getElementById("pomodoroPause");
    const pomodoroReset = document.getElementById("pomodoroReset");

    let pomodoroInterval = null;
    let pomodoroSeconds = 25 * 60;

    function updatePomodoroDisplay() {
      const m = Math.floor(pomodoroSeconds / 60);
      const s = pomodoroSeconds % 60;
      pomodoroTimer.textContent = String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function pomodoroTick() {
      if (pomodoroSeconds <= 0) {
        clearInterval(pomodoroInterval);
        pomodoroInterval = null;
        pomodoroStart.style.display = "";
        pomodoroPause.style.display = "none";
        pomodoroTimer.textContent = "00:00";
        return;
      }
      pomodoroSeconds--;
      updatePomodoroDisplay();
    }

    pomodoroStart.addEventListener("click", () => {
      if (pomodoroSeconds <= 0) return;
      pomodoroStart.style.display = "none";
      pomodoroPause.style.display = "";
      pomodoroInterval = setInterval(pomodoroTick, 1000);
    });

    pomodoroPause.addEventListener("click", () => {
      clearInterval(pomodoroInterval);
      pomodoroInterval = null;
      pomodoroStart.style.display = "";
      pomodoroPause.style.display = "none";
    });

    pomodoroReset.addEventListener("click", () => {
      clearInterval(pomodoroInterval);
      pomodoroInterval = null;
      pomodoroSeconds = 25 * 60;
      updatePomodoroDisplay();
      pomodoroStart.style.display = "";
      pomodoroPause.style.display = "none";
    });

    focusBtn.addEventListener("click", () => {
      document.body.classList.toggle("focus-mode");
      focusBtn.classList.toggle("active");
      if (document.body.classList.contains("focus-mode")) {
        pomodoroWidget.style.display = "block";
      } else {
        pomodoroWidget.style.display = "none";
        clearInterval(pomodoroInterval);
        pomodoroInterval = null;
        pomodoroSeconds = 25 * 60;
        updatePomodoroDisplay();
        pomodoroStart.style.display = "";
        pomodoroPause.style.display = "none";
      }
    });

    function showLogin() {
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("authGate").style.display = "none";
    }

    document.getElementById("authForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("authEmail").value;
      const pass = document.getElementById("authPass").value;
      const errEl = document.getElementById("authError");
      errEl.style.display = "none";

      const { error } = await db.auth.signInWithPassword({ email, password: pass });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = "block";
      } else {
        showDashboard();
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await db.auth.signOut();
      showLogin();
    });

    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        showDashboard();
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
